included:
  - Codalon

excluded:
  - Codalon/.build
  - Codalon/DerivedData

opt_in_rules:
  - array_init
  - closure_spacing
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - identical_operands
  - joined_default_parameter
  - last_where
  - literal_expression_end_indentation
  - modifier_order
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - strict_fileprivate
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - yoda_condition

disabled_rules:
  - trailing_whitespace

force_cast: error
force_try: error
force_unwrapping: error

identifier_name:
  min_length: 2
  max_length: 60

line_length:
  warning: 140
  error: 200

type_name:
  min_length: 3
  max_length: 60

analyzer_rules:
  - unused_import
